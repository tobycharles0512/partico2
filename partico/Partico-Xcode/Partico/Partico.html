<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;color:#fff !important;-webkit-text-fill-color:#fff !important;}
html,body,#root{height:100%;width:100%;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif,'Apple Color Emoji','Segoe UI Emoji','Noto Color Emoji';background:linear-gradient(135deg,#0d0d0d 0%,#1a0d2e 50%,#00ff41 100%);color:#fff;}
::-webkit-scrollbar{width:4px;}
.leaflet-container{border-radius:14px;z-index:1;}
.leaflet-control-attribution{display:none;}
::-webkit-scrollbar-track{background:rgba(255,255,255,0.05);}
::-webkit-scrollbar-thumb{background:linear-gradient(#00ff41,#00d944);border-radius:4px;}
input,textarea,select{font-family:inherit;outline:none;}
button{font-family:inherit;cursor:pointer;border:none;}
@keyframes fadeIn{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.4;}}
@keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}
@keyframes slideUp{from{transform:translateY(100%);opacity:0;}to{transform:translateY(0);opacity:1;}}
@keyframes pop{0%{transform:scale(0.5);opacity:0;}70%{transform:scale(1.1);}100%{transform:scale(1);opacity:1;}}
@keyframes glow{0%,100%{text-shadow:0 0 20px rgba(0,255,65,0.8);}50%{text-shadow:0 0 40px rgba(0,255,65,1),0 0 60px rgba(0,217,68,0.8);}}
@keyframes coverReveal{0%{transform:scale(1.15);opacity:0;}60%{opacity:1;transform:scale(1);}85%{opacity:1;}100%{opacity:0;transform:scale(1);}}
@keyframes bubble{0%{box-shadow:0 0 0 0 rgba(0,255,65,0.7);}50%{box-shadow:0 0 0 10px rgba(0,255,65,0);}100%{box-shadow:0 0 0 0 rgba(0,255,65,0);}}
.screen{position:absolute;top:0;left:0;right:0;bottom:0;overflow-y:auto;overflow-x:hidden;}
.card{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);border-radius:16px;padding:16px;}
.btn-primary{background:linear-gradient(135deg,#00ff41,#00d944);color:#000;border-radius:12px;padding:14px 20px;font-size:16px;font-weight:600;width:100%;transition:opacity 0.2s,transform 0.1s;position:relative;overflow:hidden;}
.btn-primary:hover{animation:bubble 0.6s ease-out;}
.btn-primary:active{transform:scale(0.97);opacity:0.85;}
.btn-secondary{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:#fff;border-radius:12px;padding:12px 20px;font-size:15px;font-weight:500;width:100%;transition:opacity 0.2s;position:relative;overflow:hidden;}
.btn-secondary:hover{animation:bubble 0.6s ease-out;}
.btn-secondary:active{transform:scale(0.97);opacity:0.85;}
.input-field{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);border-radius:12px;padding:14px 16px;font-size:15px;color:#fff;width:100%;}
.input-field::placeholder{color:rgba(255,255,255,0.4);}
.input-field:focus{border-color:#00ff41;background:rgba(0,255,65,0.08);}
.badge{background:linear-gradient(135deg,#00ff41,#00d944);border-radius:20px;padding:2px 8px;font-size:11px;font-weight:700;color:#000;}
</style>

<body>
<!-- Pre-loader sits OUTSIDE #root so React mounting clears #root but not this -->
<div id="pre-loader" style="position:fixed;inset:0;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(135deg,#0d0d0d 0%,#1a0a1a 100%);font-family:-apple-system,sans-serif;transition:opacity 0.4s ease;">
  <svg width="120" height="120" viewBox="0 0 240 280" style="margin-bottom:16px;animation:spin 3s linear infinite;">
    <!-- Large pink background rounded rectangle (left side) -->
    <rect x="20" y="40" width="100" height="160" rx="30" fill="#00ff41" opacity="0.9"/>
    <!-- Highlight on rounded bg -->
    <ellipse cx="50" cy="60" rx="25" ry="20" fill="rgba(255,255,255,0.3)"/>

    <!-- Vinyl Record -->
    <g transform="translate(140, 95)">
      <!-- Outer vinyl circle -->
      <circle cx="0" cy="0" r="75" fill="#00ff41" opacity="0.95"/>
      <!-- Highlight on record -->
      <ellipse cx="-20" cy="-25" rx="25" ry="30" fill="rgba(255,255,255,0.2)"/>

      <!-- Record grooves (black lines) -->
      <circle cx="0" cy="0" r="68" fill="none" stroke="#0d0d0d" stroke-width="4" opacity="0.85"/>
      <circle cx="0" cy="0" r="56" fill="none" stroke="#0d0d0d" stroke-width="3.5" opacity="0.8"/>
      <circle cx="0" cy="0" r="44" fill="none" stroke="#0d0d0d" stroke-width="3" opacity="0.75"/>
      <circle cx="0" cy="0" r="32" fill="none" stroke="#0d0d0d" stroke-width="2.5" opacity="0.7"/>

      <!-- Center label (black circle) -->
      <circle cx="0" cy="0" r="22" fill="#0d0d0d" opacity="0.9"/>
      <!-- Center label inner (pink dot) -->
      <circle cx="0" cy="0" r="14" fill="#00ff41" opacity="0.95"/>
      <circle cx="0" cy="0" r="8" fill="#00cc44" opacity="0.8"/>

      <!-- Record player arm (tonearm) -->
      <g transform="translate(50, -35)">
        <line x1="0" y1="0" x2="35" y2="-35" stroke="#0d0d0d" stroke-width="5" stroke-linecap="round" opacity="0.9"/>
        <circle cx="35" cy="-35" r="8" fill="#0d0d0d" opacity="0.9"/>
        <circle cx="35" cy="-35" r="5" fill="#00ff41" opacity="0.7"/>
      </g>
    </g>

    <!-- Record player base/stand -->
    <ellipse cx="140" cy="200" rx="70" ry="22" fill="#00ff41" opacity="0.85"/>
    <ellipse cx="140" cy="200" rx="68" ry="18" fill="#00cc44" opacity="0.6"/>
    <!-- Stand accent lines -->
    <path d="M 90 200 Q 85 208 90 215" stroke="#0d0d0d" stroke-width="2.5" fill="none" opacity="0.5"/>
    <path d="M 190 200 Q 195 208 190 215" stroke="#0d0d0d" stroke-width="2.5" fill="none" opacity="0.5"/>
  </svg>
  <div style="font-size:28px;font-weight:900;background:linear-gradient(135deg,#00ff41,#00d944);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px">Partico</div>
  <div id="pre-loader-msg" style="color:rgba(255,255,255,0.4);font-size:14px;margin-bottom:24px">Loading your party app…</div>
  <div style="display:flex;gap:6px">
    <div style="width:8px;height:8px;border-radius:50%;background:#00ff41;animation:pb 1.2s 0s infinite"></div>
    <div style="width:8px;height:8px;border-radius:50%;background:#00d944;animation:pb 1.2s 0.2s infinite"></div>
    <div style="width:8px;height:8px;border-radius:50%;background:#00ff41;animation:pb 1.2s 0.4s infinite"></div>
  </div>
</div>
<style>
@keyframes pb{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.3;transform:scale(0.7)}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
</style>
<script>
// Improved pre-loader with better error handling
var _plTimer = null;
var _preloaderShown = true;
var _appLoaded = false;

function hidePreloader() {
  if (_appLoaded) return;
  _appLoaded = true;
  var pl = document.getElementById('pre-loader');
  if (pl && _preloaderShown) {
    pl.style.opacity = '0';
    setTimeout(function() {
      if (pl) pl.style.display = 'none';
      _preloaderShown = false;
    }, 400);
  }
}

function showPreloaderError(message) {
  var msg = document.getElementById('pre-loader-msg');
  if (msg) {
    msg.textContent = message;
    msg.style.color = '#ff6b6b';
  }
}

// Check if React loaded
if (typeof React === 'undefined' || typeof ReactDOM === 'undefined') {
  showPreloaderError('Loading app dependencies... (may take a moment)');
}

// Monitor #root for React-rendered content
_plTimer = setInterval(function() {
  var r = document.getElementById('root');
  if (r && r.children && r.children.length > 0) {
    clearInterval(_plTimer);
    hidePreloader();
